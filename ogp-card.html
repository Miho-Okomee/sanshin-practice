<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<style>
  :root{
    --paper:#f6f1e7; --panel:#fffdf8; --line:#d8cdb9; --ink:#25201a; --sub:#8a8073;
    --tc:#c2402d;
    --azul:#2b5ea7; --azul-deep:#1c3f78; --green:#3c7a4a; --gold:#c9a14a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:var(--paper);font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;position:relative}
  .frame{position:absolute;inset:26px;border:1px solid var(--line);border-radius:22px;
    background:linear-gradient(180deg,var(--panel) 0%,var(--paper) 100%)}
  .frame::after{content:"";position:absolute;inset:10px;border:1px solid #e4dac6;border-radius:15px}
  .left{position:absolute;left:74px;top:78px;width:640px;z-index:3}
  .kicker{font-size:18px;letter-spacing:.22em;color:var(--sub);font-weight:700;margin-bottom:30px}
  .kicker b{color:var(--tc)}
  h1{font-family:"Hiragino Mincho ProN","YuMincho",serif;font-weight:600;color:var(--ink);font-size:60px;line-height:1.28}
  h1 .tc{color:var(--tc)}
  .sub{margin-top:26px;font-size:21px;color:#5c544a;line-height:1.7;font-weight:500}
  .tags{margin-top:30px;display:flex;gap:12px}
  .tag{font-size:17px;font-weight:700;color:#fff;padding:9px 18px;border-radius:10px}
  .t1{background:var(--azul-deep)}.t2{background:var(--green)}.t3{background:var(--tc)}
  .brand{position:absolute;left:74px;bottom:62px;z-index:3;font-family:"Hiragino Mincho ProN",serif;
    font-size:30px;color:var(--ink);font-weight:600;letter-spacing:.02em}
  .brand span{font-family:"Hiragino Sans",sans-serif;font-size:18px;color:var(--sub);font-weight:600;margin-left:12px;letter-spacing:.08em}
  .right{position:absolute;right:36px;top:36px;bottom:36px;width:412px;border-radius:16px;overflow:hidden;z-index:2;
    background:linear-gradient(150deg,var(--azul) 0%,var(--azul-deep) 55%,#16345f 100%)}
  .right svg{position:absolute;inset:0;width:100%;height:100%}
  .glow{position:absolute;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle,rgba(197,213,234,.45),transparent 65%);top:-60px;right:-40px}
  .strings{position:absolute;left:56px;top:120px;right:56px}
  .string{height:2px;background:rgba(255,255,255,.35);margin-bottom:64px;position:relative}
  .dot{position:absolute;top:-9px;width:20px;height:20px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px var(--gold)}
</style></head>
<body>
  <div class="frame"></div>
  <div class="right">
    <div class="glow"></div>
    <svg viewBox="0 0 412 558" preserveAspectRatio="none">
      <g stroke="var(--gold)" fill="none" stroke-width="2.4" opacity="0.5">
        <path d="M-10,120 L90,170 L150,140 L240,210 L330,180 L430,250"/>
        <path d="M60,-10 L110,90 L80,180 L160,260 L130,360 L200,470 L170,580"/>
      </g>
    </svg>
    <div class="strings">
      <div class="string"><div class="dot" style="left:40%"></div></div>
      <div class="string"><div class="dot" style="left:65%"></div></div>
      <div class="string"><div class="dot" style="left:20%"></div></div>
    </div>
  </div>
  <div class="left">
    <div class="kicker">— PRACTICE ／ <b>SANSHIN&nbsp;TOOL</b></div>
    <h1>三線練習アプリ<br>歌詞・工工四・弦位置<br><span class="tc">を3段で確認。</span></h1>
    <div class="sub">音源に合わせてハイライトが進む、<br>個人練習用のシンプルなツール。</div>
    <div class="tags">
      <span class="tag t1">歌詞</span>
      <span class="tag t2">工工四</span>
      <span class="tag t3">弦位置</span>
    </div>
  </div>
  <div class="brand">三線練習アプリ<span>Miho</span></div>
</body></html>
